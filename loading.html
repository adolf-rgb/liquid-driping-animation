<!DOCTYPE html>
<html>
<head>
  <title>A13-Drip Bootstrap</title>
  <!-- Bootstrap CSS -->
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    
         body {
          margin: 0;
          min-height: 100vh;
          background: #000;
          display: flex;
          justify-content: center;
          align-items: center;
          flex-wrap: wrap; /* allow multiple containers to wrap on small screens */
          gap: 20px;
        }
    
        .c{
          position: relative;
          width: 90vw;       
          max-width: 400px; 
          height: 300px;
          background: #000;
          filter: contrast(30);
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          align-items: center;
          padding: 20px;
        }
    
        .b {
          width: 70vw;       /* responsive width */
          max-width: 280px;  /* original width */
          height: 45px;
          background: #fff;
          border-radius: 20px;
          filter: blur(9px);
        }
    
        .d {
          position: absolute;
          width: 45px;
          height: 45px;
          background: #fff;
          border-radius: 50%;
          filter: blur(12px);
          left: 50%;
          margin-left: -22.5px;
          top: 0;
          animation: d 3s infinite cubic-bezier(0.6, 0.1, 0.8, 0.4);
        }
    
       
        @keyframes d {
      0%   { top: 10px; }
      25%  { top: 50px; opacity: 1;}
      75%  { top: 210px;  opacity: 1; }
      100% { top: 250px; opacity: 0; }
    }
    
    
  </style>
</head>
<body>

  <div class="c mx-auto">
    <div class="b"></div>
    <div class="d"></div>
  <div class="b"></div>
  </div>

  <div class="c mx-auto">
    <div class="b"></div>
    <div class="d"></div>
    <div class="b"></div>
  </div>

  <div class="c mx-auto">
    <div class="b"></div>
    <div class="d"></div>
    <div class="b"></div>
  </div>

</body>
</html>
